name: CI
on: [push, pull_request]
permissions:
  contents: read
jobs:
  build:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest  # service containers only available on Linux
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: elastic/elastic-github-actions/elasticsearch@5ef0493557069742db30dc6f38c548dcccf38432 # master
        with:
          stack-version: 9.3.2
          security-enabled: false
      - run: pip install .[test]
      - env:
          ELASTICSEARCH_URL: http://localhost:9200
        run: coverage run --source=ocdsindex -m pytest -W error
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          fail_ci_if_error: true
